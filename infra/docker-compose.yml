services:
  postgres:
    image: postgres:15-alpine
    container_name: omniextract_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: omniextract
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: omniextract_queue
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
